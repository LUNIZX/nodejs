<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LUNIZX — الانطلاقة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;font-family:'Tajawal',sans-serif;overflow:hidden}
    body{
      display:flex;align-items:center;justify-content:center;text-align:center;color:#fff;
      background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#ff512f,#dd2476);
      background-size:400% 400%;animation:bg 18s ease infinite;
    }
    @keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;animation:float 12s ease-in-out infinite}
    .orb1{width:340px;height:340px;background:#ff512f;top:-80px;left:-60px}
    .orb2{width:300px;height:300px;background:#1fa2ff;bottom:-90px;right:-70px;animation-delay:-4s}
    .orb3{width:260px;height:260px;background:#7f00ff;top:40%;right:20%;animation-delay:-8s}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-40px)}}
    .card{
      position:relative;z-index:2;padding:60px 70px;border-radius:28px;
      background:rgba(255,255,255,.08);backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,.18);box-shadow:0 30px 80px rgba(0,0,0,.45);
      animation:pop 1s cubic-bezier(.2,.8,.2,1)both;
    }
    @keyframes pop{from{opacity:0;transform:translateY(40px) scale(.9)}to{opacity:1;transform:none}}
    h1{
      font-size:clamp(48px,9vw,110px);font-weight:900;letter-spacing:4px;
      background:linear-gradient(90deg,#fff,#ffd8a8,#ff8fab,#fff);
      background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;
      animation:shine 4s linear infinite;text-shadow:0 0 40px rgba(255,255,255,.25)
    }
    @keyframes shine{to{background-position:200% center}}
    p.tag{margin-top:14px;font-size:clamp(16px,2.5vw,24px);font-weight:700;color:#e8e8ff;opacity:.9}
    .badge{
      display:inline-block;margin-top:28px;padding:12px 30px;border-radius:999px;font-weight:700;
      background:linear-gradient(90deg,#ff512f,#dd2476);box-shadow:0 10px 30px rgba(221,36,118,.5);
      animation:pulse 2.5s ease-in-out infinite
    }
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    footer{position:absolute;bottom:22px;width:100%;z-index:2;font-size:13px;color:rgba(255,255,255,.6)}
  </style>
</head>
<body>
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
  <div class="card">
    <h1>LUNIZX</h1>
    <p class="tag">شُحن الموقع بنجاح على Railway ⚡</p>
    <div class="badge">أول تطبيق لي على الإنترنت</div>
  </div>
  <footer>© 2026 LUNIZX — صُنع بشغف. جميع الحقوق محفوظة.</footer>
</body>
</html>
